<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Pagina con Immagine</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      text-align: center;
      margin: 0;
    }

    .container {
      background: white;
      margin: 40px auto;
      padding: 20px;
      width: 600px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    img {
      max-width: 100%;
      height: auto;
      margin-top: 20px;
      border-radius: 10px;
    }

    input, button {
      margin-top: 10px;
      padding: 8px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>La Mia Pagina Web</h1>
  <p>Qui sotto puoi visualizzare un'immagine.</p>

  <!-- Controlli -->
  <input type="text" id="imgUrl" placeholder="Inserisci URL immagine">
  <br>
  <button onclick="cambiaImmagine()">Mostra Immagine</button>
  <br><br>
  <input type="file" id="fileInput" accept="image/*">

  <!-- Immagine -->
  <img id="immagine" src="sprite.png" alt="Immagine">

</div>

<script>
  function cambiaImmagine() {
    const url = document.getElementById("imgUrl").value;
    if (url) {
      document.getElementById("immagine").src = url;
    }
  }

  document.getElementById("fileInput").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
      document.getElementById("immagine").src = event.target.result;
    };
    reader.readAsDataURL(file);
  });
</script>

</body>
</html>
